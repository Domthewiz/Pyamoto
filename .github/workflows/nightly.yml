name: Nightly Build

on:
  push:
    branches: [master]
    # Only rebuild when code changes. Pure asset changes (game data, images,
    # text files) are silently skipped and will be picked up in the next
    # release that also has a code change.
    paths:
      - 'miyamoto/**'
      - '*.py'
      - '**/*.py'
      - '**/*.pyx'
      - '**/*.c'
      - '**/*.h'
      - 'FastYZ/**'
      - 'addrlib/**'
      - 'bc3/**'
      - 'buildtools/*.py'
      - 'requirements.txt'
      - '.github/workflows/**'
  workflow_dispatch:

# Cancel any in-progress run for the same branch so rapid pushes don't pile up
concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────────────────────────
  # Preflight — fast sanity check before any expensive build starts.
  # Verifies that build.py and its key imports resolve correctly so
  # a bad refactor fails in seconds rather than after 20 min of
  # Cython compilation.
  # ──────────────────────────────────────────────────────────────
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Verify critical imports and entry points
        run: |
          python - <<'EOF'
          import sys, os
          errors = []

          # build.py must be able to import the version
          try:
              from miyamoto.globals import MiyamotoVersionFloat
              print(f"  OK  miyamoto.globals  →  v{MiyamotoVersionFloat}")
          except Exception as e:
              errors.append(f"miyamoto.globals import failed: {e}")

          # Entry point must exist
          if not os.path.isfile("pyamoto.py"):
              errors.append("pyamoto.py entry point is missing")
          else:
              print("  OK  pyamoto.py exists")

          # build.py must not reference the old root-level globals
          with open("build.py") as f:
              src = f.read()
          if "from globals import" in src:
              errors.append("build.py still uses 'from globals import' (should be 'from miyamoto.globals import')")
          else:
              print("  OK  build.py import path is correct")

          # Executable entry point in build.py must match what exists on disk
          import re
          match = re.search(r"Executable\(\s*['\"](.+?)['\"]", src)
          if match:
              ep = match.group(1)
              if not os.path.isfile(ep):
                  errors.append(f"build.py Executable points to '{ep}' which does not exist")
              else:
                  print(f"  OK  Executable entry point '{ep}' exists")

          # project.json must exist (globals.py reads it at runtime)
          if not os.path.isfile("project.json"):
              errors.append("project.json is missing")
          else:
              print("  OK  project.json exists")

          if errors:
              print("\nPREFLIGHT FAILED:")
              for e in errors:
                  print(f"  ✗  {e}")
              sys.exit(1)
          print("\nAll preflight checks passed.")
          EOF

  # ──────────────────────────────────────────────────────────────
  # Windows x64
  # ──────────────────────────────────────────────────────────────
  build-windows:
    needs: preflight
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python 3.9 x64
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          architecture: x64

      # Set up MSVC 64-bit environment so distutils finds cl.exe; our
      # ClangBuildExt then redirects cl.exe → clang-cl at spawn time.
      - name: Set up MSVC x64 environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Add LLVM to PATH
        shell: pwsh
        run: |
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Python dependencies
        run: pip install Cython==3.2.4 "PyQt5==5.15.11" SarcLib==0.3 "cx_Freeze==8.4.1"

      - name: Build
        run: python build.py build_ext --inplace build_exe

      - name: Get version
        id: ver
        shell: pwsh
        run: |
          $v = python -c "import json; print(json.load(open('project.json'))['version_float'])"
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Package as zip
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          Compress-Archive `
            -Path "distrib\miyamoto_v$v\*" `
            -DestinationPath "Pyamoto-v$v-Windows-x64.zip" `
            -CompressionLevel Optimal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: Pyamoto-*.zip
          retention-days: 7


  # ──────────────────────────────────────────────────────────────
  # macOS Universal  (single arm64 runner; x86_64 PyQt5 merged via lipo)
  #
  # Strategy:
  #   1. Build Cython extensions as universal2 (ARCHFLAGS both arches).
  #   2. Run bdist_mac — cx_Freeze freezes the arm64 PyQt5 + universal
  #      Cython extensions into an arm64 app bundle.
  #   3. Download the x86_64 PyQt5 wheel from PyPI and extract it.
  #   4. merge_pyqt5.py lipo-merges every PyQt5 Mach-O inside the bundle
  #      with its x86_64 counterpart (no-op if the wheel is already
  #      universal2, which PyQt5 5.15.x ships for macOS).
  #   5. Ad-hoc sign the merged bundle once, then package as DMG.
  # ──────────────────────────────────────────────────────────────
  build-macos:
    needs: preflight
    name: macOS Universal DMG
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: pip install Cython==3.2.4 "PyQt5==5.15.11" SarcLib==0.3 "cx_Freeze==8.4.1" "dmgbuild==1.6.5"

      - name: Build universal Cython extensions + arm64 app bundle
        env:
          ARCHFLAGS: "-arch x86_64 -arch arm64"
        run: python build.py build_ext --inplace bdist_mac

      # PyQt5 5.15.x ships universal2 wheels (arm64 + x86_64 in one file).
      # pip already installed that wheel above, so the .so files in the
      # bundle are already universal.  merge_pyqt5.py detects this and
      # reports "already universal" for every file (no-op).  If a future
      # PyQt5 version ever ships arm64-only, the script will report the
      # gap without crashing, keeping the build visible as a warning.
      - name: Verify / merge PyQt5 universality in bundle
        run: |
          PYQT5_PARENT=$(python3 -c \
            "import os, PyQt5; print(os.path.dirname(os.path.dirname(PyQt5.__file__)))")
          python buildtools/merge_pyqt5.py build/Pyamoto.app "$PYQT5_PARENT"

      - name: Ad-hoc sign merged bundle
        run: codesign --force --deep --sign - build/Pyamoto.app

      - name: Create DMG
        run: python buildtools/create_dmg.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal-dmg
          path: Pyamoto-*-macOS-universal.dmg
          retention-days: 7


  # ──────────────────────────────────────────────────────────────
  # Linux x86_64  AppImage
  # ──────────────────────────────────────────────────────────────
  build-linux-x86_64:
    needs: preflight
    name: Linux x86_64 AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install system libraries
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 libxcb1 libxkbcommon-x11-0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xfixes0 \
            libgl1-mesa-dev

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: pip install Cython==3.2.4 "PyQt5==5.15.11" SarcLib==0.3 "cx_Freeze==8.4.1"

      - name: Build
        run: python build.py build_ext --inplace build_exe

      - name: Get version
        id: ver
        run: |
          echo "version=$(python3 -c 'import json; print(json.load(open("project.json"))["version_float"])')" \
            >> $GITHUB_OUTPUT

      - name: Assemble AppDir
        run: |
          V="${{ steps.ver.outputs.version }}"
          APPDIR="AppDir"
          mkdir -p "${APPDIR}"
          cp -r "distrib/miyamoto_v${V}/." "${APPDIR}/"
          cp buildtools/Pyamoto.desktop "${APPDIR}/Pyamoto.desktop"
          cp miyamotodata/icon.png       "${APPDIR}/Pyamoto.png"
          cp buildtools/AppRun           "${APPDIR}/AppRun"
          chmod +x "${APPDIR}/AppRun" "${APPDIR}/Pyamoto"

      - name: Download appimagetool
        run: |
          wget -q -O appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool

      - name: Build AppImage
        run: |
          V="${{ steps.ver.outputs.version }}"
          APPIMAGE_EXTRACT_AND_RUN=1 \
          ARCH=x86_64 \
            ./appimagetool --no-appstream AppDir \
            "Pyamoto-v${V}-Linux-x86_64.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-appimage
          path: Pyamoto-*.AppImage
          retention-days: 7


  # ──────────────────────────────────────────────────────────────
  # Linux arm64  AppImage
  # ──────────────────────────────────────────────────────────────
  build-linux-arm64:
    name: Linux arm64 AppImage
    if: false  # TODO: re-enable once arm64 PyQt5 wheel situation is resolved
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      # PyQt5 has no pre-built arm64 Linux wheel on PyPI, so it must build
      # from source.  qtbase5-dev + qt5-qmake supply the Qt5 headers and qmake
      # that sipbuild (the PyQt5 build backend) requires.
      - name: Install system libraries and Qt5 build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 libxcb1 libxkbcommon-x11-0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xfixes0 \
            libgl1-mesa-dev \
            qtbase5-dev qt5-qmake qtchooser
          # Make qmake resolvable as plain 'qmake' for sipbuild
          sudo update-alternatives --install /usr/bin/qmake qmake \
            /usr/lib/qt5/bin/qmake 10

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: pip install Cython==3.2.4 SarcLib==0.3 "cx_Freeze==8.4.1" "PyQt5==5.15.11"

      - name: Build
        run: python build.py build_ext --inplace build_exe

      - name: Get version
        id: ver
        run: |
          echo "version=$(python3 -c 'import json; print(json.load(open("project.json"))["version_float"])')" \
            >> $GITHUB_OUTPUT

      - name: Assemble AppDir
        run: |
          V="${{ steps.ver.outputs.version }}"
          APPDIR="AppDir"
          mkdir -p "${APPDIR}"
          cp -r "distrib/miyamoto_v${V}/." "${APPDIR}/"
          cp buildtools/Pyamoto.desktop "${APPDIR}/Pyamoto.desktop"
          cp miyamotodata/icon.png       "${APPDIR}/Pyamoto.png"
          cp buildtools/AppRun           "${APPDIR}/AppRun"
          chmod +x "${APPDIR}/AppRun" "${APPDIR}/Pyamoto"

      - name: Download appimagetool (aarch64)
        run: |
          wget -q -O appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-aarch64.AppImage"
          chmod +x appimagetool

      - name: Build AppImage
        run: |
          V="${{ steps.ver.outputs.version }}"
          APPIMAGE_EXTRACT_AND_RUN=1 \
          ARCH=aarch64 \
            ./appimagetool --no-appstream AppDir \
            "Pyamoto-v${V}-Linux-arm64.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-appimage
          path: Pyamoto-*.AppImage
          retention-days: 7


  # ──────────────────────────────────────────────────────────────
  # Release  (create / update the nightly GitHub Release)
  # ──────────────────────────────────────────────────────────────
  release:
    name: Publish Nightly Release
    runs-on: ubuntu-latest
    # Run even if some build jobs failed — publish whatever succeeded.
    # Skip only when the whole workflow was cancelled or every build failed.
    if: >-
      always() && !cancelled() &&
      (needs.build-windows.result == 'success' ||
       needs.build-macos.result == 'success' ||
       needs.build-linux-x86_64.result == 'success')
    needs:
      - build-windows
      - build-macos
      - build-linux-x86_64
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version and date
        id: meta
        run: |
          echo "version=$(python3 -c 'import json; print(json.load(open("project.json"))["version_float"])')" \
            >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Collect release files
        run: |
          mkdir release_files
          find _artifacts -type f \( -name "*.zip" -o -name "*.dmg" -o -name "*.AppImage" \) \
            -exec cp {} release_files/ \;
          echo "--- Release files ---"
          ls -lh release_files/

      # Build the release body dynamically from whatever artifacts are present.
      # This ensures the table only lists files that actually exist, even when
      # one or more build jobs failed and produced no artifact.
      - name: Build release body
        run: |
          {
            echo "Automated nightly build from [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})."
            echo ""
            echo "| Platform | File |"
            echo "|---|---|"
            for f in release_files/*-macOS-*.dmg; do
              [ -f "$f" ] && echo "| macOS Universal | \`$(basename "$f")\` |"
            done
            for f in release_files/*-Windows-*.zip; do
              [ -f "$f" ] && echo "| Windows x64 | \`$(basename "$f")\` |"
            done
            for f in release_files/*-Linux-x86_64*.AppImage; do
              [ -f "$f" ] && echo "| Linux x86_64 | \`$(basename "$f")\` |"
            done
            for f in release_files/*-Linux-arm64*.AppImage; do
              [ -f "$f" ] && echo "| Linux arm64 | \`$(basename "$f")\` |"
            done
          } > release_body.md
          cat release_body.md

      # Delete any same-day nightly release + tag before creating the new one.
      # --cleanup-tag removes both the release and the git tag via the GitHub
      # API (not git push), which avoids the pre_receive "creations restricted"
      # error that occurs when trying to reuse a tag tied to an immutable
      # published release.  The || true is normal on first run of the day.
      - name: Delete stale nightly release for today
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="nightly-${{ steps.meta.outputs.date }}"
          gh release delete "$TAG" --cleanup-tag --yes || true

      - name: Create nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ steps.meta.outputs.date }}
          name: "Nightly ${{ steps.meta.outputs.date }}  (v${{ steps.meta.outputs.version }})"
          prerelease: true
          make_latest: true
          generate_release_notes: false
          body_path: release_body.md
          files: release_files/*
